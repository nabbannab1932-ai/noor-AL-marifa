<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>نظام الطلاب</title>
</head>

<body>

<h1>نظام تسجيل الطلاب</h1>

<h2>إضافة طالب</h2>

<input type="text" id="name" placeholder="اسم الطالب">
<input type="number" id="score" placeholder="الدرجة">
<button onclick="addStudent()">إضافة</button>

<hr>

<h2>قائمة الطلاب</h2>
<div id="students"></div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://fmdrigcrvbmqxxgpsime.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtZHJpZ2NydmJtcXh4Z3BzaW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDk4NTEsImV4cCI6MjA4ODE4NTg1MX0.qKTG15BuS6t0ig4x6rSHzuogoUcGRV7QMvT1vbo-TU8";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// إضافة طالب
async function addStudent() {

  const name = document.getElementById("name").value;
  const score = document.getElementById("score").value;

  if(name === "" || score === "") {
    alert("يرجى ملء الحقول");
    return;
  }

  const { error } = await supabase
    .from('students')
    .insert([{ name: name, score: score }]);

  if (!error) {
    document.getElementById("name").value = "";
    document.getElementById("score").value = "";
    loadStudents();
  } else {
    alert("حدث خطأ");
    console.log(error);
  }
}

// عرض الطلاب
async function loadStudents() {

  const { data, error } = await supabase
    .from('students')
    .select('*')
    .order('id', { ascending: true });

  if (!error) {
    let container = document.getElementById("students");
    container.innerHTML = "";

    data.forEach(student => {
      container.innerHTML += 
        `<p>${student.name} - الدرجة: ${student.score}</p>`;
    });
  }
}

window.onload = loadStudents;

</script>

</body>
</html>
